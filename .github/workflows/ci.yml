name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: zig build test

  build:
    needs: test
    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - aarch64-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: zyouz-${{ matrix.target }}
          path: zig-out/bin/zyouz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          for dir in artifacts/zyouz-*; do
            target=$(basename "$dir" | sed 's/^zyouz-//')
            chmod +x "$dir/zyouz"
            tar -czf "zyouz-${target}.tar.gz" -C "$dir" zyouz
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
